# Quarkus Configuration
quarkus.application.name=Employee Transportation VRP Solver
quarkus.http.port=5000
quarkus.http.host=0.0.0.0

# Database Configuration (H2)
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:file:./db/vrp;AUTO_SERVER=TRUE
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=false

# Qute Templates
quarkus.qute.suffixes=html,txt

# GraphHopper Configuration
graphhopper.osm.file=rheinland-pfalz-latest.osm.pbf
graphhopper.cache.dir=./graphhopper-cache
graphhopper.profiles=car

# Timefold Solver Configuration
quarkus.timefold.solver.termination.spent-limit=120s
quarkus.timefold.solver.environment-mode=REPRODUCIBLE

# Logging
quarkus.log.level=INFO
quarkus.log.category."com.vrp".level=DEBUG
quarkus.log.category."ai.timefold.solver".level=INFO

# Dev Mode
%dev.quarkus.hibernate-orm.log.sql=true
%dev.quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] %s%e%n
