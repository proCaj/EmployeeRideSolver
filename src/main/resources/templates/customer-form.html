{#include base}
{#content}
<div class="px-4 py-6 sm:px-0 max-w-3xl mx-auto">
    <div class="mb-6">
        <a href="/customers" class="text-sm text-gray-500 hover:text-gray-700">
            ← Back to Customers
        </a>
    </div>
    
    <div class="bg-white shadow rounded-lg">
        <div class="px-6 py-4 border-b border-gray-200">
            <h2 class="text-2xl font-bold text-gray-900">{title}</h2>
        </div>
        
        <form id="customer-form" class="px-6 py-6 space-y-6">
            {#if isEdit}
            <input type="hidden" name="id" value="{customer.id}">
            {/if}
            
            <div>
                <label for="name" class="block text-sm font-medium text-gray-700">Company Name *</label>
                <input type="text" id="name" name="name" value="{customer.name ?: ''}" required
                       class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-primary focus:border-primary sm:text-sm px-3 py-2 border">
            </div>
            
            <div>
                <label for="address" class="block text-sm font-medium text-gray-700">Address *</label>
                <input type="text" id="address" name="address" value="{customer.address ?: ''}" required
                       class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-primary focus:border-primary sm:text-sm px-3 py-2 border">
                <p class="mt-1 text-sm text-gray-500">Full street address including city and postal code</p>
            </div>
            
            <div class="grid grid-cols-1 gap-6 sm:grid-cols-2">
                <div>
                    <label for="latitude" class="block text-sm font-medium text-gray-700">Latitude *</label>
                    <input type="number" id="latitude" name="latitude" value="{customer.latitude ?: ''}" step="0.000001" required
                           class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-primary focus:border-primary sm:text-sm px-3 py-2 border">
                    <p class="mt-1 text-sm text-gray-500">e.g., 49.6295</p>
                </div>
                
                <div>
                    <label for="longitude" class="block text-sm font-medium text-gray-700">Longitude *</label>
                    <input type="number" id="longitude" name="longitude" value="{customer.longitude ?: ''}" step="0.000001" required
                           class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-primary focus:border-primary sm:text-sm px-3 py-2 border">
                    <p class="mt-1 text-sm text-gray-500">e.g., 8.3578</p>
                </div>
            </div>
            
            <div class="bg-blue-50 border border-blue-200 rounded-md p-4">
                <div class="flex">
                    <svg class="h-5 w-5 text-blue-400" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"></path>
                    </svg>
                    <div class="ml-3">
                        <p class="text-sm text-blue-700">
                            You can find coordinates by searching the address on Google Maps and right-clicking the location.
                        </p>
                    </div>
                </div>
            </div>
            
            <div class="flex justify-end space-x-3 pt-6 border-t border-gray-200">
                <a href="/customers" class="inline-flex items-center px-4 py-2 border border-gray-300 text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50">
                    Cancel
                </a>
                <button 
                    type="submit"
                    {#if isEdit}
                    hx-put="/api/customers/{customer.id}"
                    {#else}
                    hx-post="/api/customers"
                    {/if}
                    hx-include="#customer-form"
                    hx-swap="none"
                    class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md shadow-sm text-white bg-secondary hover:bg-purple-700">
                    {#if isEdit}Update{#else}Create{/if} Customer
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    document.body.addEventListener('htmx:afterRequest', function(event) \{
        if (event.detail.successful && (event.detail.pathInfo.requestPath.includes('/api/customers'))) \{
            window.location.href = '/customers';
        \}
    \});
</script>
{/content}
{/include}
