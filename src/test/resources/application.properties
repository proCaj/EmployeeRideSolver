# ===================================================================
# TEST profile — used by all @QuarkusTest classes.
# Deliberately isolated from the dev configuration:
#   - In-memory H2 (never touches the dev ./db/vrp file DB, no locking).
#   - Fresh schema each JVM boot -> DataBootstrap sees an empty DB and reseeds
#     (it skips when Customer.count() > 0).
#   - Shorter solver limits so the pipeline E2E completes in reasonable test time;
#     unimproved-spent-limit lets the solver stop early once it plateaus.
# ===================================================================

quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:vrp-test;DB_CLOSE_DELAY=-1
quarkus.hibernate-orm.database.generation=drop-and-create

# Only the (gated) pipeline E2E actually runs the solver, so a longer budget here does not
# slow the always-on suites. It gives the full-week problem a fair chance to reach feasibility.
quarkus.timefold.solver.termination.spent-limit=90s
quarkus.timefold.solver.termination.unimproved-spent-limit=30s

# GraphHopper: the .pbf path comes from GRAPHHOPPER_PBF when the real-routing suites run;
# the cache is built into ./graphhopper-cache by the `real-routing` Maven profile before boot.
graphhopper.osm.file=${GRAPHHOPPER_PBF:rheinland-pfalz-latest.osm.pbf}
graphhopper.cache.dir=./graphhopper-cache

# Keep the Google key wired the same way as prod; live tests are gated on GOOGLE_ROUTES_LIVE.
google.maps.api.key=${GOOGLE_MAPS_API_KEY:}

# Trim log noise from the solver during tests; keep our own package informative.
quarkus.log.category."ai.timefold.solver".level=WARN
quarkus.log.category."com.vrp".level=INFO
